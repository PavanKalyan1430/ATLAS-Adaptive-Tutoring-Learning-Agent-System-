version: "3.8"

services:
  # 1. PostgreSQL: Relational database for metadata and chat history
  postgres:
    image: postgres:15-alpine
    container_name: archer_postgres
    environment:
      POSTGRES_USER: archer_user
      POSTGRES_PASSWORD: archer_password
      POSTGRES_DB: archer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Qdrant: Vector database for Hybrid Search (Dense + Sparse)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: archer_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # 3. Neo4j: Graph database for Knowledge Graph
  neo4j:
    image: neo4j:5.15.0
    container_name: archer_neo4j
    environment:
      NEO4J_AUTH: neo4j/archer_graph_pass
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # HTTP browser
      - "7687:7687" # Bolt connection
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # 4. Redis: In-memory cache and agent state
  redis:
    image: redis:7-alpine
    container_name: archer_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  redis_data:
